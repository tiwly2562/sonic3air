name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. ดึงโค้ดลงมาในเครื่อง Cloud
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. ติดตั้ง Java (JDK 17)
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. ให้สิทธิ์การรันไฟล์ gradlew (ระบุพาธลึกลงไปตามโครงสร้างโปรเจกต์)
    - name: Grant execute permission for gradlew
      run: chmod +x Oxygen/sonic3air/build/_android/gradlew

    # 4. สั่งบิลด์แอป Android โดยสั่งรันจากโฟลเดอร์ _android
    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: Oxygen/sonic3air/build/_android

    # 5. กวาดหาไฟล์ APK ทุกตัวที่บิลด์เสร็จจากทุกโฟลเดอร์ย่อยมาให้อัตโนมัติ
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sonic3air-android-debug-apk
        path: "**/build/outputs/apk/**/*.apk"
