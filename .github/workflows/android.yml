name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ✅ เพิ่ม step นี้ — copy assets ที่จำเป็นก่อน build
    - name: Copy assets to Android project
      run: |
        mkdir -p Oxygen/sonic3air/build/_android/app/src/main/assets
        cp -r Oxygen/sonic3air/data   Oxygen/sonic3air/build/_android/app/src/main/assets/
        cp -r Oxygen/sonic3air/scripts Oxygen/sonic3air/build/_android/app/src/main/assets/
        cp    Oxygen/sonic3air/config.json Oxygen/sonic3air/build/_android/app/src/main/assets/

    - name: Grant execute permission for gradlew
      run: chmod +x Oxygen/sonic3air/build/_android/gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: Oxygen/sonic3air/build/_android

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sonic3air-android-debug-apk
        path: "**/build/outputs/apk/**/*.apk"
